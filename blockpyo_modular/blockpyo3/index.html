<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BLOCKPYO — 스케줄러</title>

  <!-- 웹 폰트 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- 스타일시트 -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ── 앱 헤더 ─────────────────────────────────── -->
  <header class="app-header">
    <div class="logo">
      <div class="logo-dot"></div>
      BLOCKPYO
      <span class="logo-sub">스케줄러</span>
    </div>
    <div class="header-spacer"></div>
    <div class="header-actions">
      <button class="btn btn-ghost btn-sm" id="btnSample">샘플 데이터</button>
      <button class="btn btn-ghost btn-sm" id="btnExportCsv" disabled>CSV 내보내기</button>
    </div>
  </header>

  <!-- ── 앱 본문 ─────────────────────────────────── -->
  <div class="app-body">

    <!-- ── 사이드바 ──────────────────────────────── -->
    <aside class="sidebar">

      <!-- 탭 헤더 -->
      <div class="sidebar-tabs">
        <button class="stab active" data-tab="emp">직원</button>
        <button class="stab"        data-tab="settings">설정</button>
      </div>

      <!-- 직원 탭 -->
      <div class="stab-panel active" id="tabEmp">
        <div class="section">
          <div class="section-title">직원 추가</div>
          <div class="qaform">
            <div class="qa-row">
              <div class="input-wrap" style="flex:2">
                <label>이름</label>
                <input type="text" id="qaName" placeholder="이름 입력">
              </div>
              <div class="input-wrap">
                <label>조</label>
                <select id="qaGroup">
                  <option value="OPEN">오픈</option>
                  <option value="MID" selected>중간</option>
                  <option value="CLOSE">마감</option>
                </select>
              </div>
            </div>
            <div class="qa-row">
              <div class="input-wrap">
                <label>출근시간</label>
                <select id="qaStart"></select>
              </div>
              <div class="input-wrap">
                <label>근무시간</label>
                <select id="qaHours">
                  <option value="6">6h</option>
                  <option value="8" selected>8h</option>
                </select>
              </div>
            </div>
            <button class="btn btn-primary btn-full" id="btnQaAdd">+ 직원 추가</button>
          </div>
        </div>
        <div id="empList" style="flex:1; overflow-y:auto; padding-bottom:12px;"></div>
      </div>

      <!-- 설정 탭 -->
      <div class="stab-panel" id="tabSettings">
        <div class="section">
          <div class="section-title">운영 시간</div>
          <div class="settings-grid">
            <div><label class="field-label">시작</label><select id="dayStart"></select></div>
            <div><label class="field-label">종료</label><select id="dayEnd"></select></div>
          </div>
        </div>
        <div class="section">
          <div class="section-title">코어 블록</div>
          <div class="settings-grid">
            <div><label class="field-label">최소(분)</label><input type="number" id="coreMin"  value="45" min="15" max="120" step="15"></div>
            <div><label class="field-label">최대(분)</label><input type="number" id="coreMax"  value="60" min="15" max="120" step="15"></div>
          </div>
        </div>
        <div class="section">
          <div class="section-title">식사 / 회의</div>
          <div class="settings-grid">
            <div><label class="field-label">식사 시간(분)</label><input type="number" id="mealDur"    value="60" min="30" max="90"  step="15"></div>
            <div><label class="field-label">회의 시간(분)</label><input type="number" id="meetingDur" value="15" min="15" max="30"  step="15"></div>
            <div><label class="field-label">1차 회의</label><input type="text" id="mtg1" value="15:00"></div>
            <div><label class="field-label">2차 회의</label><input type="text" id="mtg2" value="15:15"></div>
          </div>
        </div>
        <div class="section">
          <div class="section-title">오픈조 식사</div>
          <div class="settings-grid">
            <div><label class="field-label">11:30 인원</label>
              <select id="openMeal1130"><option value="0">0</option><option value="1">1</option><option value="2">2</option></select>
            </div>
            <div><label class="field-label">12:30 인원</label>
              <select id="openMeal1230"><option value="0">0</option><option value="1">1</option><option value="2">2</option></select>
            </div>
          </div>
        </div>
        <div class="section">
          <div class="section-title">마감조 식사 모드</div>
          <select id="closeMealMode" style="width:100%">
            <option value="auto">자동</option>
            <option value="2-2">2-2</option>
            <option value="3-1">3-1</option>
            <option value="4-0">4-0</option>
          </select>
        </div>
        <div class="section">
          <div class="section-title">난수 시드</div>
          <input type="number" id="seed" value="112" style="width:100%">
          <p class="field-hint">같은 시드 = 동일한 스케줄 재현</p>
        </div>
      </div>

      <!-- 스케줄 생성 버튼 -->
      <div class="sidebar-footer">
        <button class="btn-generate" id="btnGenerate">⚡ 스케줄 생성</button>
      </div>

    </aside>

    <!-- ── 메인 콘텐츠 ──────────────────────────── -->
    <main class="main">
      <div class="main-toolbar">
        <span class="status-badge" id="statusMsg">직원을 추가하고 스케줄을 생성하세요</span>
        <div class="toolbar-spacer"></div>
      </div>
      <div class="stats-row"        id="statsBar"></div>
      <div class="legend-row"       id="legendBar"></div>
      <div class="violations-panel" id="violationsPanel"></div>
      <div class="table-scroll-container">
        <div class="table-placeholder" id="tablePlaceholder">
          <div class="placeholder-icon">📋</div>
          <div class="placeholder-text">스케줄이 없습니다</div>
          <div class="placeholder-hint">직원을 추가하고 스케줄 생성 버튼을 눌러주세요</div>
        </div>
        <div class="table-wrap" id="tableWrap" style="display:none;"></div>
      </div>
    </main>

  </div>

  <!-- ── 로딩 오버레이 ─────────────────────────── -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">스케줄 생성 중...</div>
  </div>

  <!-- ── 모듈 진입점 (단 하나) ──────────────────── -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
