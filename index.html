; cart2f_used+=1\n                    elif cc['cart3f']<CONSTRAINTS.MAX_CART3F: row[j]=ST.CART3F\n                    else: row[j]=ST.CART2F\n            i=seg_end\n\ndef merge_adjacent_core_blocks(ctx):\n    schedule=ctx['schedule']; employees=ctx['employees']; active=ctx['active']\n    slots_min=ctx['slotsMin']; core_min=ctx['coreMinSlots']; core_max=ctx['coreMaxSlots']\n    target=ctx.get('target',[])\n    LATE=CONSTRAINTS.CLOSE_LATE_MIN\n    for e in employees:\n        row=schedule[e['id']]; act_row=active[e['id']]; is_close=e['group']=='CLOSE'\n        i=0\n        while i<len(row):\n            if not act_row[i] or not is_core(row[i]) or (is_close and slots_min[i]>=LATE): i+=1; continue\n            gS=i\n            while i<len(row) and act_row[i] and is_core(row[i]) and not(is_close and slots_min[i]>=LATE): i+=1\n            gE=i; g_len=gE-gS\n            kinds={row[j] for j in range(gS,gE)}\n            if len(kinds)<=1 or g_len<core_min: continue\n            cnt={ST.EXIT:0,ST.ELEV:0,ST.F3:0}\n            for j in range(gS,gE):\n                if row[j] in cnt: cnt[row[j]]+=1\n            dominant=max([ST.F3,ST.ELEV,ST.EXIT],key=lambda st:cnt[st])\n            m_end=min(gS+core_max,gE)\n            has_last=False\n            for st in kinds:\n                if st==dominant: continue\n                if not any(row[idx]==st and act_row[idx] and (idx<gS or idx>=gE) for idx in range(len(row))):\n                    has_last=True; break\n            if has_last: continue\n            blocked=False\n            for j in range(gS,m_end):\n                if row[j]==dominant: continue\n                cc=station_counts_at(schedule,employees,active,j)\n                if dominant==ST.EXIT and cc['exit']>=dyn_max_at(ST.EXIT,j,employees,active): blocked=True; break\n                if dominant==ST.ELEV and cc['elev']>=dyn_max_at(ST.ELEV,j,employees,active): blocked=True; break\n                if dominant==ST.F3   and cc['f3']  >=dyn_max_at(ST.F3,  j,employees,active): blocked=True; break\n            if blocked:\n                if dominant!=ST.F3:\n                    dominant=ST.F3; blocked=False\n                    for j in range(gS,m_end):\n                        if row[j]==dominant: continue\n                        cc=station_counts_at(schedule,employees,active,j)\n                        if cc['f3']>=dyn_max_at(ST.F3,j,employees,active): blocked=True; break\n                    if blocked: continue\n                else: continue\n            snap=list(row)\n            for j in range(gS,m_end): row[j]=dominant\n            for j in range(m_end,gE): row[j]=ST.CART2F\n            broken=False\n            for j in range(gS,gE):\n                if broken: break\n                orig=snap[j]\n                if not is_core(orig) or orig==row[j]: continue\n                t=target[j] if j<len(target) and target[j] else {'exit':0,'elev':0,'f3':0}\n                cc=station_counts_at(schedule,employees,active,j)\n                if orig==ST.EXIT and t['exit']>0 and cc['exit']<t['exit']: broken=True\n                if orig==ST.ELEV and t['elev']>0 and cc['elev']<t['elev']: broken=True\n                if orig==ST.F3   and t['f3']>0   and cc['f3']  <t['f3']:   broken=True\n            if broken: row[:]=snap\n\ndef enforce_max_block_length(ctx):\n    schedule=ctx['schedule']; employees=ctx['employees']; active=ctx['active']\n    slots_min=ctx['slotsMin']; core_max=ctx['coreMaxSlots']\n    LATE=CONSTRAINTS.CLOSE_LATE_MIN\n    for e in employees:\n        row=schedule[e['id']]; act_row=active[e['id']]; is_close=e['group']=='CLOSE'\n        i=0\n        while i<len(row):\n            if not act_row[i]: i+=1; continue\n            st=row[i]\n            if not is_core(st): i+=1; continue\n            bS=i\n            while i<len(row) and act_row[i] and row[i]==st: i+=1\n            bE=i; length=bE-bS\n            if length<=core_max: continue\n            if is_close and slots_min[bS]>=LATE: continue\n            if is_cl   const src_scheduler_repair = "# scheduler/repair.py \u2014 \ucee4\ubc84\ub9ac\uc9c0 \uc218\ub9ac & \ucf54\uc5b4 \uacbd\ud5d8 \ubcf4\uc7a5\nimport math\nfrom constants import ST, CONSTRAINTS\nfrom utils import build_work_blocks\nfrom scheduler.core import is_core, is_protected, station_counts_at, compute_coverage_deficits, get_fairness_cost, recolor_block, dyn_max, dyn_max_at\n\ndef repair_coverage(ctx):\n    schedule = ctx['schedule']; employees = ctx['employees']\n    active = ctx['active']; slots_min = ctx['slotsMin']\n    target = ctx['target']; core_count = ctx.get('coreCount')\n    any_fixed = False\n\n    for _ in range(200):\n        defs = compute_coverage_deficits(schedule, employees, active, slots_min, target)\n        if not defs: break\n        fixed = False\n        for d in defs:\n            needs = []\n            if d['exit'] > 0: needs.append(ST.EXIT)\n            if d['elev'] > 0: needs.append(ST.ELEV)\n            if d['f3']   > 0: needs.append(ST.F3)\n            for n_st in needs:\n                cnt_at_d = station_counts_at(schedule, employees, active, d['idx'])\n                t_at_d = target[d['idx']] if target[d['idx']] else {'exit':0,'elev':0,'f3':0}\n                if n_st == ST.EXIT and cnt_at_d['exit'] >= dyn_max_at(ST.EXIT, d['idx'], employees, active): continue\n                if n_st == ST.ELEV and cnt_at_d['elev'] >= dyn_max_at(ST.ELEV, d['idx'], employees, active): continue\n                if n_st == ST.F3   and cnt_at_d['f3']   >= dyn_max_at(ST.F3,   d['idx'], employees, active): continue\n                cands = []\n                for e in employees:\n                    if not active[e['id']][d['idx']]: continue\n                    cur = schedule[e['id']][d['idx']]\n                    if is_protected(cur) or cur in (ST.OFF, n_st): continue\n                    if cur == ST.EXIT and t_at_d['exit'] > 0 and cnt_at_d['exit'] <= t_at_d['exit']: continue\n                    if cur == ST.ELEV and t_at_d['elev'] > 0 and cnt_a napshot = list(schedule[wid])\n                recolor_block(ctx, wid, d['idx'], n_st)\n                violated = False\n                for si in range(len(slots_min)):\n                    if violated: break\n                    if not active[wid][si]: continue\n                    if schedule[wid][si] != n_st or snapshot[si] == n_st: continue\n                    cc2 = station_counts_at(schedule, employees, active, si)\n                    if n_st == ST.EXIT and cc2['exit'] > dyn_max_at(ST.EXIT, si, employees, active): violated = True\n                    if n_st == ST.ELEV and cc2['elev'] > dyn_max_at(ST.ELEV, si, employees, active): violated = True\n                    if n_st == ST.F3   and cc2['f3']   > dyn_max_at(ST.F3,   si, employees, active): violated = True\n                if not violated:\n                    for si in range(len(slots_min)):\n                        if violated: break\n                        if not active[wid][si]: continue\n                        orig_st = snapshot[si]\n                        if not is_core(orig_st) or orig_st == n_st or schedule[wid][si] == orig_st: continue\n                        tsi = target[si] if target[si] else {'exit':0,'elev':0,'f3':0}\n                        cc3 = station_counts_at(schedule, employees, active, si)\n                        if orig_st == ST.EXIT and tsi['exit'] > 0 and cc3['exit'] < tsi['exit']: violated = True\n                        if orig_st == ST.ELEV and tsi['elev'] > 0 and cc3['elev'] < tsi['elev']: violated = True\n                        if orig_st == ST.F3   and tsi['f3']   > 0 and cc3['f3']   < tsi['f3']:   violated = True\n                if violated:\n                    schedule[wid][:] = snapshot\n                    continue\n                if core_count and wid in core_count:\n                    cc4 = {'EXIT':0,'ELEV':0,'F3':0}\n                    for si2 in range(len(slots_min)):\n                        if not active[wid][si2]: continue\n                        s =           if adj_before >= core_max: continue\n                    cap = min(ws + core_max - adj_before, b['end'])\n                    we = ws\n                    for si in range(ws, cap):\n                        cc = station_counts_at(schedule, employees, active, si)\n                        if cnt_of(cc, n_st) >= max_of(n_st, si): break\n                        cur_slot = row[si]\n                        if is_core(cur_slot) and cur_slot != n_st:\n                            tgt = ctx.get('target', [{}] * len(slots_min))[si] or {'exit':0,'elev':0,'f3':0}\n                            ccc = station_counts_at(schedule, employees, active, si)\n                            surplus = ((cur_slot==ST.EXIT and (tgt['exit']==0 or ccc['exit']>tgt['exit'])) or\n                                       (cur_slot==ST.ELEV and (tgt['elev']==0 or ccc['elev']>tgt['elev'])) or\n                                       (cur_slot==ST.F3   and (tgt['f3']==0   or ccc['f3']>tgt['f3'])))\n                            if not surplus: break\n                        we = si + 1\n                    if we - ws < core_min: continue\n                    for i in range(ws, we): row[i] = n_st\n                    placed = True; has_it = True; any_placed = True; break\n\n            if placed: continue\n\n            # Pass2 & Pass3 (simplified - direct swap)\n            for b in cand_blocks:\n                if placed: break\n                wi = b['start']\n                while wi < b['end']:\n                    inc = next((e2 for e2 in employees\n                                if e2['id'] != e['id'] and active[e2['id']][wi] and\n                                   schedule[e2['id']][wi] == n_st), None)\n                    if not inc: wi += 1; continue\n                    i_row = schedule[inc['id']]; i_act = active[inc['id']]\n                    ibS = wi; ibE = wi + 1\n                    while ibS > 0 and i_act[ibS-1] and i_row[ibS-1] == n_st: ibS -= 1\n                    while ibE < len(i_row) and i_act[ibE] and i_row[ibE] == n_st: ibE += 1\n                    swap_s = max(b['start'], ibS); swap_e = min(b['end'], ibE)\n                    if swap_e - swap_s < core_min: wi = ibE; continue\n                    i_total = total_slots_of(i_row, i_act, n_st)\n                    in_win = sum(1 for si in range(swap_s, swap_e) if i_act[si] and i_row[si] == n_st)\n                    residual = i_total - in_win\n                    adj_e = sum(1 for k in range(swap_s-1, -1, -1)\n                                if act_row[k] and row[k] == n_st)\n                    max_swap = min(swap_e - swap_s, core_max - adj_e)\n                    if residual <= 0: max_swap = min(max_swap, swap_e - swap_s - 1)\n                    i_safe = 0\n                    for j in range(max_swap):\n                        k2 = swap_s + j\n                        if k2 >= len(i_row) or not i_act[k2]: break\n                        if is_protected(i_row[k2]) or i_row[k2] in (ST.OFF, ST.OPEN_PREP): break\n                        i_safe += 1\n                    swap_len = max(0, min(max_swap, i_safe))\n                    if swap_len < core_min: wi = ibE; continue\n                    snap_e = list(row); snap_i = list(i_row)\n                    e_st = b['st']\n                    for i in range(swap_s, swap_s + swap_len):\n                        i_row[i] = e_st; row[i] = n_st\n                    ok = True\n                    if is_core(e_st):\n                        e_remain = sum(1 for i2 in range(len(row)) if act_row[i2] and row[i2] == e_st)\n                        if e_remain < core_min: ok = False\n                    for si in range(swap_s, swap_s + swap_len):\n                        if not ok: break\n                        cc = station_counts_at(schedule, employees, active, si)\n                        if cc['exit'] > dyn_max_at(ST.EXIT, si, employees, active): ok = False\n                        if cc['elev'] > dyn_max_at(ST.ELEV, si, employees, active): ok = False\n if placed: break\n                if not act_row[si]: continue\n                if e['group']=='CLOSE' and slots_min[si]>=CONSTRAINTS.CLOSE_LATE_MIN: continue\n                st=row[si]\n                if is_protected(st) or st in (ST.OFF,ST.OPEN_PREP,n_st): continue\n                adj_before=sum(1 for k in range(si-1,-1,-1) if act_row[k] and row[k]==n_st)\n                if adj_before>=core_max: continue\n                cap=min(si+core_max-adj_before,len(slots_min))\n                we=si\n                for si2 in range(si,cap):\n                    if not act_row[si2]: break\n                    st2=row[si2]\n                    if is_protected(st2) or st2 in (ST.OFF,ST.OPEN_PREP): break\n                    cc=station_counts_at(schedule,employees,active,si2)\n                    cnt_n=(cc['exit'] if n_st==ST.EXIT else cc['elev'] if n_st==ST.ELEV else cc['f3'])\n                    mx=dyn_max_at(n_st,si2,employees,active,schedule)\n                    if cnt_n>=mx: break\n                    we=si2+1\n                if we-si<core_min: continue\n                snap=list(row)\n                for i in range(si,we): row[i]=n_st\n                ok=True\n                for si2 in range(si,we):\n                    cc=station_counts_at(schedule,employees,active,si2)\n                    if cc['exit']>dyn_max_at(ST.EXIT,si2,employees,active,schedule): ok=False; break\n                    if cc['elev']>dyn_max_at(ST.ELEV,si2,employees,active,schedule): ok=False; break\n                    if cc['f3']  >dyn_max_at(ST.F3,  si2,employees,active,schedule): ok=False; break\n                if ok: placed=True; any_placed=True\n                else: row[:]=snap\n    return any_placed\n\ndef force_deficit_slots(ctx):\n    schedule=ctx['schedule']; employees=ctx['employees']; active=ctx['active']\n    slots_min=ctx['slotsMin']; target=ctx['target']\n    core_min=ctx.get('coreMinSlots',2)\n    defs=compute_coverage_deficits(schedule,employees,active,slots_min,target)\n    if not defs: return\n    for d in defs:\n        needs=[]\n        if d['exit']>0: needs.append(ST.EXIT)\n        if d['elev']>0: needs.append(ST.ELEV)\n        if d['f3']>0:   needs.append(ST.F3)\n        for n_st in needs:\n            cands=[e for e in employees\n                   if active[e['id']][d['idx']] and\n                      schedule[e['id']][d['idx']] not in (n_st,ST.REST,ST.MEAL,ST.MTG,ST.OFF,ST.OPEN_PREP)]\n            if not cands: continue\n            cc0=station_counts_at(schedule,employees,active,d['idx'])\n            cnt0=(cc0['exit'] if n_st==ST.EXIT else cc0['elev'] if n_st==ST.ELEV else cc0['f3'])\n            mx0=dyn_max_at(n_st,d['idx'],employees,active)\n            if cnt0>=mx0: continue\n            winner=cands[0]\n            schedule[winner['id']][d['idx']]=n_st\n";
  const src_scheduler_validate = "# scheduler/validate.py \u2014 \uac80\uc99d & \ud1b5\uacc4\nimport math\nfrom constants import ST, CONSTRAINTS\nfrom utils import parse_time_to_min, min_to_time, build_work_blocks\nfrom scheduler.core import is_core, station_counts_at, compute_coverage_deficits, dyn_max_at\n\ndef validate(ctx):\n    schedule=ctx['schedule']; employees=ctx['employees']; active=ctx['active']\n    slots_min=ctx['slotsMin']; target=ctx['target']\n    core_min=ctx['coreMinSlots']; core_max=ctx['coreMaxSlots']\n    v = []\n    def add(type_, detail): v.append({'type': type_, 'detail': detail})\n\n    for e in employees:\n        row=schedule[e['id']]; act_row=active[e['id']]\n        eS=-1; eE=-1\n        for i in range(len(row)):\n            if act_row[i]:\n                if eS<0: eS=i\n                eE=i+1\n        if eS<0: continue\n        blocks=build_work_blocks(row,act_row)\n        is_close=e['group']=='CLOSE'\n        for b in blocks:\n            if b['st'] in (ST.REST,ST.MEAL,ST.MTG,ST.OPEN_PREP): continue\n            length=b['end']-b['start']\n            is_late=is_close and slots_min[b['end']-1]>=CONSTRAINTS.CLOSE_LATE_MIN\n            if is_late: continue\n            is_only=not any(b2['st']==b['st'] for b2 in blocks if b2 is not b)\n            is_near_late=is_close and slots_min[b['end']-1]>=CONSTRAINTS.CLOSE_LATE_MIN-3*15\n            is_sole_cov=False\n            if length==1 and is_core(b['st']):\n                t1=target[b['start']] if target[b['start']] else {'exit':0,'elev':0,'f3':0}\n                cc1=station_counts_at(schedule,employees,active,b['start'])\n                is_sole_cov=((b['st']==ST.EXIT and t1['exit']>0 and cc1['exit']<=t1['exit']) or\n                             (b['st']==ST.ELEV and t1['elev']>0 and cc1['elev']<=t1['elev']))\n            if is_core(b['st']) and b['st']!=ST.F3 and length<core_min and not is_only and not is_near_late and not is_sole_cov:\n                add('\ube14\ub85d\uae38\uc774', f\"{e['name']} {min_to_time(slots_min[b['start']])} {b['st']} {length*15}\ubd84 < \ucd5c\uc18c {core_min*15}\ubd84\")\n            if is_core(b['st']) and length>core_max:\n                add('\ube14\ub85d\uae38\uc774', f\"{e['name']} {min_to_time(slots_min[b['start']])} {b['st']} {length*15}\ubd84 > \ucd5c\ub300 {core_max*15}\ubd84\")\n        has_exit=any(b['st']==ST.EXIT for b in blocks)\n        has_elev=any(b['st']==ST.ELEV for b in blocks)\n        has_f3  =any(b['st']==ST.F3   for b in blocks)\n        ms=[]\n        if not has_exit: ms.append('2F\ucd9c\ucc28')\n        if not has_elev: ms.append('2F\uc5d8\ubca0')\n        if not has_f3:   ms.append('3F')\n        if ms: add('\ucf54\uc5b4\ubbf8\uacbd\ud5d8', f\"{e['name']}: {', '.join(ms)}\")\n        if not any(b['st']==ST.MEAL for b in blocks): add('\uc2dd\uc0ac', f\"{e['name']} \uc2dd\uc0ac \ubbf8\ubc30\uce58\")\n        rests=[i for i in range(eS,eE) if act_row[i] and row[i]==ST.REST]\n        r1_window=math.ceil(150/15) if is_close else math.ceil(90/15)\n        if not any(i<eS+r1_window for i in rests): add('\ud734\uc2dd', f\"{e['name']} 1\ucc28 \ud734\uc2dd \ubbf8\ubc30\uce58\")\n        if not any(i>=eE-math.ceil(90/15) for i in rests): add('\ud734\uc2dd', f\"{e['name']} 3\ucc28 \ud734\uc2dd \ubbf8\ubc30\uce58\")\n        if e['hours']==8 and len(rests)<3: add('\ud734\uc2dd', f\"{e['name']} 2\ucc28 \ud734\uc2dd \ubbf8\ubc30\uce58\")\n\n    for i in range(len(slots_min)):\n        t=target[i]\n        if not t or (t['exit']==0 and t['elev']==0 and t['f3']==0): continue\n        c=station_counts_at(schedule,employees,active,i)\n        if c['exit']<t['exit']: add('\ucee4\ubc84\ub9ac\uc9c0', f\"\ucd9c\ucc28 \ubbf8\ubc30\uce58: {min_to_time(slots_min[i])}\")\n        if c['elev']<t['elev']: add('\ucee4\ubc84\ub9ac\uc9c0', f\"\uc5d8\ubca0 \ubbf8\ubc30\uce58: {min_to_time(slots_min[i])}\")\n        if c['f3']<t['f3']:     add('\ucee4\ubc84\ub9ac\uc9c0', f\"3F \ubbf8\ubc30\uce58: {min_to_time(slots_min[i])}\")\n\n    for i in range(len(slots_min)):\n        c=station_counts_at(schedule,employees,active,i)\n        if c['exit']>CONSTRAINTS.MAX_EXIT: add('\ucd08\uacfc', f\"\ucd9c\ucc28\ucd08\uacfc: {min_to_time(slots_min[i])} {c['exit']}\uba85\")\n        if c['elev']>CONSTRAINTS.MAX_ELEV: add('\ucd08\uacfc', f\"\uc5d8\ubca0\ucd08\uacfc: {min_to_time(slots_min[i])} {c['elev']}\uba85\")\n        if c['f3']>dyn_max_at(ST.F3,i,employees,active,schedule): add('\ucd08\uacfc', f\"3F\ucd08\uacfc: {min_to_time(slots_min[i])} {c['f3']}\uba85\")\n        if c['cart3f']>CONSTRAINTS.MAX_CART3F: add('\ucd08\uacfc', f\"3F\uce74\ud2b8\ucd08\uacfc: {min_to_time(slots_min[i])} {c['cart3f']}\uba85\")\n    return v\n\ndef recompute_core_count(ctx):\n    schedule=ctx['schedule']; employees=ctx['employees']; active=ctx['active']\n    slots_min=ctx['slotsMin']\n    cc={}\n    for e in employees:\n        cc[e['id']]={'EXIT':0,'ELEV':0,'F3':0}\n        for i in range(len(slots_min)):\n            if not active[e['id']][i]: continue\n            st=schedule[e['id']][i]\n            if st==ST.EXIT: cc[e['id']]['EXIT']+=1\n            elif st==ST.ELEV: cc[e['id']]['ELEV']+=1\n            elif st==ST.F3: cc[e['id']]['F3']+=1\n    ctx['coreCount']=cc\n\ndef compute_stats(ctx):\n    schedule=ctx['schedule']; employees=ctx['employees']; active=ctx['active']\n    cc={}\n    for e in employees:\n        cc[e['id']]={'EXIT':0,'ELEV':0,'F3':0,'total':0}\n        for i in range(len(schedule[e['id']])):\n            if not active[e['id']][i]: continue\n            st=schedule[e['id']][i]\n            if st==ST.EXIT: cc[e['id']]['EXIT']+=1; cc[e['id']]['total']+=1\n            elif st==ST.ELEV: cc[e['id']]['ELEV']+=1; cc[e['id']]['total']+=1\n            elif st==ST.F3: cc[e['id']]['F3']+=1; cc[e['id']]['total']+=1\n    cv={}\n    for id_,c in cc.items():\n        avg=c['total']/3\n        cv[id_]={**c,'avg':avg,\n                 'variance':((c['EXIT']-avg)**2+(c['ELEV']-avg)**2+(c['F3']-avg)**2)/3}\n    defs=compute_coverage_deficits(ctx['schedule'],ctx['employees'],ctx['active'],ctx['slotsMin'],ctx['target'])\n    vars_=[cv[id_]['variance'] for id_ in cv]\n    return {\n        'coreCounts':   cc,\n        'coreVariance': cv,\n        'totalDeficits':len(defs),\n        'deficits':     defs,\n        'maxVariance':  max([0]+vars_),\n        'avgVariance':  sum(vars_)/max(1,len(vars_)),\n    }\n";
  const src_scheduler_index = "# scheduler/index.py \u2014 \uc2a4\ucf00\uc904 \uc0dd\uc131 \uc9c4\uc785\uc810\nimport math\nfrom constants import ST, CONSTRAINTS, DEFAULTS\nfrom utils import parse_time_to_min, min_to_time, build_slots, mins_to_slots, compute_active_mask, seeded_rng\nfrom scheduler.core import is_core, is_protected, make_coverage_targets, station_counts_at, compute_coverage_deficits\nfrom scheduler.events import (apply_meetings, apply_open_meals, apply_mid_meals, apply_close_meals,\n                               apply_open_prep, apply_early_core_coverage, apply_rest_breaks,\n                               apply_post_mtg_fixed_slots, spread_simultaneous_rests)\nfrom scheduler.assign import build_pre_assign, assign_blocks_greedy\nfrom scheduler.repair import repair_coverage, ensure_core_experience\nfrom scheduler.balance import (balance_core_rotation, repair_overstaffing, enforce_cart2f_max,\n                                enforce_cart3f_max, enforce_close_late_assignment, fix_fragment_blocks,\n                                fill_remaining_slots, merge_adjacent_core_blocks, enforce_max_block_length)\nfrom scheduler.force import rebalance_variance, force_core_experience, force_deficit_slots\nfrom scheduler.validate import validate, recompute_core_count, compute_stats\n\ndef generate_schedule(inp):\n    STEP = 15\n    day_start = parse_time_to_min(inp.get('dayStart') or DEFAULTS.DAY_START)\n    day_end   = parse_time_to_min(inp.get('dayEnd')   or DEFAULTS.DAY_END)\n    slots_min = build_slots(day_start, day_end, STEP)\n    slots     = [min_to_time(m) for m in slots_min]\n    rng       = seeded_rng(int(inp.get('seed') or DEFAULTS.SEED))\n\n    meal_dur     = int(inp.get('mealDur')    or DEFAULTS.MEAL_DUR_MIN)\n    meeting_dur  = int(inp.get('meetingDur') or DEFAULTS.MTG_DUR_MIN)\n    core_min_sl  = mins_to_slots(int(inp.get('coreMin') or DEFAULTS.CORE_MIN_MIN), STEP)\n    core_max_sl  = mins_to_slots(int(inp.get('coreMax') or DEFAULTS.CORE_MAX_MIN), STEP)\n    any_min_sl   = mins_to_slots(int(inp.get('anyMin')  or DEFAULTS.ANY_MIN_MIN),  STEP)\n\n    seen_ids = set()\n    employees = []\n    for idx, e in enumerate((inp.get('employees') or [])):\n        eid = str(e.get('id') or f'E{idx+1}')\n        if eid in seen_ids:\n            k = 2\n            while f'{eid}_{k}' in seen_ids: k += 1\n            eid = f'{eid}_{k}'\n        seen_ids.add(eid)\n        group = str(e.get('group') or 'MID').upper()\n        if group not in ('OPEN','MID','CLOSE'): group = 'MID'\n        hours = 6 if int(e.get('hours') or 8) == 6 else 8\n        start_min = parse_time_to_min(e.get('start') or '08:00')\n        end_min   = start_min + hours * 60 + meal_dur\n        employees.append({**e, 'id': eid, 'group': group, 'hours': hours,\n                          'startMin': start_min, 'endMin': end_min, 'idx': idx})\n\n    n_slots  = len(slots_min)\n    schedule = {e['id']: [''] * n_slots for e in employees}\n    active   = compute_active_mask(employees, slots_min)\n    for e in employees:\n        for i in range(n_slots):\n            if not active[e['id']][i]: schedule[e['id']][i] = ST.OFF\n\n    close_emps   = [e for e in employees if e['group'] == 'CLOSE']\n    close_end    = max((e['endMin'] for e in close_emps), default=day_end)\n    init_target  = make_coverage_targets(slots_min, close_end, employees, active)\n\n    ctx = {\n        'slotsMin': slots_min, 'slots': slots, 'employees': employees,\n        'schedule': schedule, 'active': active,\n        'target': init_target,\n        'coreMinSlots': core_min_sl, 'coreMaxSlots': core_max_sl, 'anyMinSlots': any_min_sl,\n        'mealDurMin': meal_dur, 'meetingDurMin': meeting_dur,\n        'mtg1Min':      parse_time_to_min(inp.get('mtg1') or DEFAULTS.MTG1_TIME),\n        'mtg2Min':      parse_time_to_min(inp.get('mtg2') or DEFAULTS.MTG2_TIME),\n        'openMeal1130': int(inp.get('openMeal1130') or DEFAULTS.OPEN_MEAL_1130),\n        'openMeal1230': int(inp.get('openMeal1230') or DEFAULTS.OPEN_MEAL_1230),\n        'closeMealMode':inp.get('closeMealMode') or DEFAULTS.CLOSE_MEAL_MODE,\n        'rng': rng, 'preMap': None, 'coreCount': None,\n    }\n\n    def calc_target():\n        result = []\n        for i, t in enumerate(slots_min):\n            if t < CONSTRAINTS.COVERAGE_START_MIN or t >= close_end:\n                result.append({'exit':0,'elev':0,'f3':0}); continue\n            avail = [e for e in employees\n                     if active[e['id']][i] and\n                        not is_protected(schedule[e['id']][i]) and\n                        schedule[e['id']][i] not in (ST.OPEN_PREP,ST.OFF,ST.CART2F,ST.CART3F)]\n            n = len(avail)\n            if n <= 0: result.append({'exit':0,'elev':0,'f3':0})\n            elif n == 1: result.append({'exit':1,'elev':0,'f3':0})\n            elif n == 2: result.append({'exit':1,'elev':1,'f3':0})\n            else:        result.append({'exit':1,'elev':1,'f3':1})\n        return result\n\n    def calc_target_aggressive():\n        result = []\n        for i, t in enumerate(slots_min):\n            if t < CONSTRAINTS.COVERAGE_START_MIN or t >= close_end:\n                result.append({'exit':0,'elev':0,'f3':0}); continue\n            avail = [e for e in employees\n                     if active[e['id']][i] and\n                        not is_protected(schedule[e['id']][i]) and\n                        schedule[e['id']][i] not in (ST.OPEN_PREP,ST.OFF,ST.CART2F)]\n            n = len(avail)\n            if n <= 0: result.append({'exit':0,'elev':0,'f3':0})\n            elif n == 1: result.append({'exit':1,'elev':0,'f3':0})\n            elif n == 2: result.append({'exit':1,'elev':1,'f3':0})\n            else:        result.append({'exit':1,'elev':1,'f3':1})\n        return result\n\n    def post_clean():\n        fix_fragment_blocks(ctx)\n        merge_adjacent_core_blocks(ctx)\n        enforce_max_block_length(ctx)\n        enforce_cart2f_max(ctx)\n        enforce_cart3f_max(ctx)\n        enforce_cart2f_max(ctx)\n\n    def count_violations():\n        defs = compute_coverage_deficits(schedule, employees, active, slots_min, ctx['target'])\n        missing = sum(1 for e in employees\n                      if not any(schedule[e['id']][i]==ST.EXIT for i in range(n_slots) if active[e['id']][i]) or\n                         not any(schedule[e['id']][i]==ST.ELEV for i in range(n_slots) if active[e['id']][i]) or\n                         not any(schedule[e['id']][i]==ST.F3   for i in range(n_slots) if active[e['id']][i]))\n        return len(defs) + missing\n\n    # Phase 1\n    apply_meetings(ctx)\n    apply_post_mtg_fixed_slots(ctx)\n    apply_open_meals(ctx)\n    apply_mid_meals(ctx)\n    apply_close_meals(ctx)\n    apply_open_prep(ctx)\n    limit = parse_time_to_min('10:30')\n    for e in employees:\n        if e['group'] != 'OPEN': continue\n        for i in range(n_slots):\n            if not active[e['id']][i]: continue\n            if slots_min[i] >= limit: break\n            if schedule[e['id']][i] == ST.OPEN_PREP: schedule[e['id']][i] = ''\n    apply_rest_breaks(ctx)\n    apply_open_prep(ctx)\n    apply_early_core_coverage(ctx)\n\n    # Phase 2\n    ctx['target'] = calc_target()\n    res = build_pre_assign(ctx)\n    ctx['preMap'] = res['preMap']; ctx['coreCount'] = res['coreCount']\n    assign_blocks_greedy(ctx)\n\n    # Phase 3\n    prev_violations = float('inf')\n    for _ in range(15):\n        post_clean()\n        ctx['target'] = calc_target()\n        changed = False\n        if repair_coverage(ctx):   changed = True\n        still_defs = len(compute_coverage_deficits(schedule,employees,active,slots_min,ctx['target'])) > 0\n        if not still_defs and ensure_core_experience(ctx): changed = True\n        if repair_overstaffing(ctx): changed = True\n        if balance_core_rotation(ctx): changed = True\n        recompute_core_count(ctx)\n        v = count_violations()\n        if v == 0: break\n        if not changed: break\n        if v >= prev_violations: break\n        prev_violations = v\n\n    # Phase 4\n    enforce_close_late_assignment(ctx)\n    post_clean()\n    ctx['target'] = calc_target_aggressive()\n    force_deficit_slots(ctx)\n    recompute_core_count(ctx)\n    force_core_experience(ctx)\n    rebalance_variance(ctx)\n    ctx['target'] = calc_target()\n    repair_coverage(ctx)\n    repair_overstaffing(ctx)\n    post_clean()\n    recompute_core_count(ctx)\n\n    # Phase 5\n    apply_post_mtg_fixed_slots(ctx)\n    spread_simultaneous_rests(ctx)\n    ctx['target'] = calc_target()\n    repair_coverage(ctx)\n    post_clean()\n    fill_remaining_slots(ctx)\n    repair_overstaffing(ctx)\n    repair_coverage(ctx)\n    enforce_max_block_length(ctx)\n    enforce_cart2f_max(ctx)\n    enforce_cart3f_max(ctx)\n    enforce_cart2f_max(ctx)\n    repair_coverage(ctx)\n    recompute_core_count(ctx)\n\n    # CART3F \u2192 CART2F \ucd5c\uc885 \ubcc0\ud658\n    for e in employees:\n        row = schedule[e['id']]; act_row = active[e['id']]\n        for i in range(len(row)):\n            if act_row[i] and row[i] == ST.CART3F: row[i] = ST.CART2F\n\n    ctx['target'] = calc_target_aggressive()\n    force_deficit_slots(ctx)\n    ctx['target'] = calc_target()\n    force_deficit_slots(ctx)\n\n    violations = validate(ctx)\n    stats      = compute_stats(ctx)\n    return {'schedule': schedule, 'slots': slots, 'slotsMin': slots_min,\n            'employees': employees, 'violations': violations, 'stats': stats}\n";
  const src_app = "# app.py \u2014 PyScript \uba54\uc778 \uc9c4\uc785\uc810 (GitHub Pages\uc6a9)\nimport json\nimport math\nfrom js import document, JSON, Object, console\nfrom pyodide.ffi import create_proxy\n\n# Python \ud328\ud0a4\uc9c0 \uc784\ud3ec\ud2b8 (PyScript/Pyodide \uacbd\ub85c \uc124\uc815)\nimport sys\nimport os\n# PyScript\uc5d0\uc11c py/ \ud3f4\ub354\ub97c \ubaa8\ub4c8 \uac80\uc0c9 \uacbd\ub85c\uc5d0 \ucd94\uac00\nfor p in ['/py', 'py', '.']:\n    if p not in sys.path:\n        sys.path.insert(0, p)\n\nfrom constants import ST, DEFAULTS, DEFAULT_START_OPTIONS, STATION_CSS, STATION_SHORT, GROUP_ORDER\nfrom utils import parse_time_to_min, min_to_time, build_slots\nfrom scheduler.index import generate_schedule\n\n# \u2500\u2500 \uc804\uc5ed \uc0c1\ud0dc \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n_employees = []\n_last_result = None\n_emp_counter = [0]\n_current_size = 'md'\n_idb = [None]  # IndexedDB reference\n\nSIZE_CLASSES = ['2xs','xs','sm','md','lg','xl','2xl']\nSIZE_PX = {'2xs':18,'xs':22,'sm':28,'md':36,'lg':44,'xl':54,'2xl':66}\n\ndef gen_id():\n    _emp_counter[0] += 1\n    return f'e{_emp_counter[0]}'\n\n# \u2500\u2500 IndexedDB \ud5ec\ud37c \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\ndef open_db():\n    from js import indexedDB\n    req = indexedDB.open('blockpyo_db', 1)\n    def on_upgrade(ev):\n        db = ev.target.result\n        if not db.objectStoreNames.contains('saves'):\n            db.createObjectStore('saves', Object.fromEntries([['keyPath','id']]))\n    def on_success(ev):\n        _idb[0] = ev.target.result\n        refresh_save_badges()\n    req.onupgradeneeded = create_proxy(on_upgrade)\n    req.onsuccess = create_proxy(on_success)\n\ndef idb_put(data, callback=None):\n    if not _idb[0]: return\n    tx = _idb[0].transaction(['saves'], 'readwrite')\n    store = tx.objectStore('saves')\n    req = store.put(JSON.parse(json.dumps(data)))\n    if callback:\n        req.onsuccess = create_proxy(lambda ev: callback())\n\ndef idb_get_all(callback):\n    if not _idb[0]: callback([]); return\n    tx = _idb[0].transaction(['saves'], 'readonly')\n    store = tx.objectStore('saves')\n    req = store.getAll()\n    def on_success(ev):\n        result = ev.target.result\n        items = [json.loads(JSON.stringify(result[i])) for i in range(result.length)]\n        callback(items)\n    req.onsuccess = create_proxy(on_success)\n\ndef idb_delete(id_, callback=None):\n    if not _idb[0]: return\n    tx = _idb[0].transaction(['saves'], 'readwrite')\n    store = tx.objectStore('saves')\n    req = store.delete(id_)\n    if callback:\n        req.onsuccess = create_proxy(lambda ev: callback())\n\ndef idb_count(callback):\n    if not _idb[0]: callback(0); return\n    tx = _idb[0].transaction(['saves'], 'readonly')\n    store = tx.objectStore('saves')\n    req = store.count()\n    def on_success(ev): callback(ev.target.result)\n    req.onsuccess = create_proxy(on_success)\n\n# \u2500\u2500 \uc9c1\uc6d0 \uad00\ub9ac \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\ndef read_employees_from_dom():\n    emps = []\n    for row in document.querySelectorAll('.emp-card'):\n        emps.append({\n            'id':    row.dataset.id,\n            'name':  row.querySelector('.emp-name').textContent,\n            'group': row.dataset.group,\n            'start': row.querySelector('.emp-start').value,\n            'hours': int(row.querySelector('.emp-hours').value),\n            'note':  '',\n        })\n    return emps\n\ndef render_employee_list():\n    container = document.getElementById('empList')\n    if not container: return\n    container.innerHTML = ''\n    groups = [('OPEN','\uc624\ud508\uc870'), ('MID','\uc911\uac04\uc870'), ('CLOSE','\ub9c8\uac10\uc870')]\n    for g, label in groups:\n        emps = [e for e in _employees if e['group'] == g]\n        hdr = document.createElement('div')\n        hdr.className = 'emp-group-header'\n        hdr.innerHTML = f'<span>{label}</span><span class=\"count\">{len(emps)}\uba85</span>'\n        container.appendChild(hdr)\n        for e in emps:\n            card = document.createElement('div')\n            card.className = 'emp-card'\n            card.dataset.id = e['id']\n            card.dataset.group = e['group']\n            g_label = '\uc624\ud508' if g=='OPEN' else '\uc911\uac04' if g=='MID' else '\ub9c8\uac10'\n            opts_start = ''.join(f'<option value=\"{t}\" {\"selected\" if t==e.get(\"start\",\"\") else \"\"}>{t}</option>'\n                                 for t in DEFAULT_START_OPTIONS)\n            card.innerHTML = f'''\n              <span class=\"group-badge {g}\">{g_label}</span>\n              <span class=\"emp-name\" title=\"\ub354\ube14\ud074\ub9ad\ud558\uc5ec \ud3b8\uc9d1\">{e.get(\"name\") or \"(\uc774\ub984\uc5c6\uc74c)\"}</span>\n              <select class=\"emp-start\">{opts_start}</select>\n              <select class=\"emp-hours\">\n                <option value=\"6\" {\"selected\" if e.get(\"hours\")==6 else \"\"}>6h</option>\n                <option value=\"8\" {\"selected\" if e.get(\"hours\",8)==8 else \"\"}>8h</option>\n              </select>\n              <button class=\"emp-del\" title=\"\uc0ad\uc81c\">\u2715</button>'''\n            def make_del(eid):\n                def handler(ev):\n                    global _employees\n                    _employees = [x for x in _employees if x['id'] != eid]\n                    render_employee_list()\n                return create_proxy(handler)\n            def make_dblclick(card_ref, emp_ref, name_span_ref):\n                def handler(ev):\n                    if name_span_ref.querySelector('input'): return\n                    inp = document.createElement('input')\n                    inp.type = 'text'\n                    inp.value = name_span_ref.textContent\n                    inp.className = 'emp-name-input'\n                    name_span_ref.textContent = ''\n                    name_span_ref.appendChild(inp)\n                    inp.focus()\n                    def blur(ev2):\n                        emp_ref['name'] = inp.value\n                        name_span_ref.textContent = inp.value or '(\uc774\ub984\uc5c6\uc74c)'\n                    def keydown(ev2):\n                        if ev2.key == 'Enter': inp.blur()\n                    inp.addEventListener('blur', create_proxy(blur))\n                    inp.addEventListener('keydown', create_proxy(keydown))\n                return create_proxy(handler)\n            emp_ref = next(x for x in _employees if x['id'] == e['id'])\n            name_span = card.querySelector('.emp-name')\n            card.querySelector('.emp-del').addEventListener('click', make_del(e['id']))\n            name_span.addEventListener('dblclick', make_dblclick(card, emp_ref, name_span))\n            def make_change(eid, field, el_sel):\n                def handler(ev):\n                    emp = next((x for x in _employees if x['id']==eid), None)\n                    if emp:\n                        val = card.querySelector(el_sel).value\n                        emp[field] = int(val) if field=='hours' else val\n                return create_proxy(handler)\n            card.querySelector('.emp-start').addEventListener('change', make_change(e['id'], 'start', '.emp-start'))\n            card.querySelector('.emp-hours').addEventListener('change', make_change(e['id'], 'hours', '.emp-hours'))\n            container.appendChild(card)\n\ndef add_employee(data=None):\n    if data is None: data = {}\n    eid   = data.get('id') or gen_id()\n    group = data.get('group','MID')\n    start_defaults = {'OPEN':'08:30','MID':'11:00','CLOSE':'13:30'}\n    emp = {\n        'id':    eid,\n        'name':  data.get('name',''),\n        'group': group,\n        'start': data.get('start', start_defaults.get(group,'11:00')),\n        'hours': int(data.get('hours',8)),\n        'note':  data.get('note',''),\n    }\n    _employees.append(emp)\n    return emp\n\n# \u2500\u2500 \uc124\uc815 \uc77d\uae30 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\ndef read_settings():\n    def val(id_): el=document.getElementById(id_); return el.value if el else ''\n    def ival(id_, default=0):\n        el=document.getElementById(id_)\n        if el:\n            try: return int(el.value)\n            except: return default\n        return default\n    return {\n        'dayStart':      val('dayStart') or '08:00',\n        'dayEnd':        val('dayEnd')   or '22:30',\n        'coreMin':       ival('coreMin', 45),\n        'coreMax':       ival('coreMax', 60),\n        'anyMin':        ival('coreMin', 45),\n        'mealDur':       ival('mealDur', 60),\n        'meetingDur':    ival('meetingDur', 15),\n        'mtg1':          val('mtg1') or '15:00',\n        'mtg2':          val('mtg2') or '15:15',\n        'openMeal1130':  ival('openMeal1130', 0),\n        'openMeal1230':  ival('openMeal1230', 0),\n        'closeMealMode': val('closeMealMode') or 'auto',\n        'seed':          ival('seed', 112),\n    }\n\n# \u2500\u2500 \uc2a4\ucf00\uc904 \ud14c\uc774\ube14 \ub80c\ub354\ub9c1 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\ndef render_table(result):\n    wrap = document.getElementById('tableWrap')\n    if not wrap: return\n    schedule  = result['schedule']\n    slots     = result['slots']\n    slots_min = result['slotsMin']\n    employees = result['employees']\n    violations = result['violations']\n    stats     = result['stats']\n\n    # \uc704\ubc18 \ud328\ub110\n    vp = document.getElementById('violationsPanel')\n    if vp:\n        if violations:\n            by_type = {}\n            for v in violations:\n                by_type.setdefault(v['type'], []).append(v['detail'])\n            html = '<div class=\"viol-header\">\u26a0\ufe0f \uc704\ubc18 \uc0ac\ud56d</div>'\n            for t, details in by_type.items():\n                html += f'<div class=\"viol-group\"><b>{t}</b>: {\", \".join(details[:3])}'\n                if len(details) > 3: html += f' \uc678 {len(details)-3}\uac74'\n                html += '</div>'\n            vp.innerHTML = html\n            vp.style.display = 'block'\n        else:\n            vp.innerHTML = '<div class=\"viol-ok\">\u2705 \uc704\ubc18 \uc5c6\uc74c</div>'\n            vp.style.display = 'block'\n\n    # \uc0c1\ud0dc \uba54\uc2dc\uc9c0\n    sm = document.getElementById('statusMsg')\n    if sm:\n        cnt = len(violations)\n        sm.textContent = f'\uc704\ubc18 {cnt}\uac74' if cnt else '\u2705 \uc644\ub8cc (\uc704\ubc18 \uc5c6\uc74c)'\n        sm.className = 'status-badge ' + ('warn' if cnt else 'ok')\n\n    # \uc140 \ud06c\uae30\n    cell_w = SIZE_PX.get(_current_size, 36)\n\n    # \ud14c\uc774\ube14 HTML \uc0dd\uc131\n    sorted_emps = sorted(employees, key=lambda e: (GROUP_ORDER.get(e['group'],1), e['idx']))\n    header = '<tr><th class=\"name-col\">\uc774\ub984</th>'\n    for s in slots:\n        header += f'<th class=\"time-col\">{s}</th>'\n    header += '</tr>'\n\n    rows = ''\n    for e in sorted_emps:\n        row = schedule[e['id']]\n        badge_cls = {'OPEN':'badge-open','MID':'badge-mid','CLOSE':'badge-close'}.get(e['group'],'')\n        badge_lbl = {'OPEN':'\uc624\ud508','MID':'\uc911\uac04','CLOSE':'\ub9c8\uac10'}.get(e['group'],'')\n        rows += f'<tr><td class=\"name-col\"><span class=\"group-mini {badge_cls}\">{badge_lbl}</span>{e.get(\"name\") or \"(\uc774\ub984\uc5c6\uc74c)\"}</td>'\n        prev_st = None; run_start = 0\n        cells = []\n        for i, st in enumerate(row):\n            if st == prev_st:\n                cells[-1]['span'] += 1\n            else:\n                cells.append({'st': st, 'span': 1})\n            prev_st = st\n        # Re-render without colspan for simplicity\n        for i, st in enumerate(row):\n            css = STATION_CSS.get(st, 's-unassigned')\n            short = STATION_SHORT.get(st, st)\n            style = f'width:{cell_w}px;min-width:{cell_w}px;'\n            rows += f'<td class=\"sched-cell {css}\" style=\"{style}\" title=\"{slots[i]} {e.get(\"name\",\"\")} {st}\">{short if st not in (\"\",\"OFF\") else \"\"}</td>'\n        rows += '</tr>'\n\n    wrap.innerHTML = f'<table class=\"sched-table\"><thead>{header}</thead><tbody>{rows}</tbody></table>'\n    wrap.style.display = 'block'\n    placeholder = document.getElementById('tablePlaceholder')\n    if placeholder: placeholder.style.display = 'none'\n    scroll_ctrl = document.getElementById('scrollCtrl')\n    if scroll_ctrl: scroll_ctrl.style.display = 'flex'\n    size_ctrl = document.getElementById('sizeControl')\n    if size_ctrl: size_ctrl.style.display = 'flex'\n\n    # \ubc84\ud2bc \ud65c\uc131\ud654\n    for btn_id in ['btnSave','btnExportCsv','btnPrint']:\n        btn = document.getElementById(btn_id)\n        if btn: btn.disabled = False\n\n# \u2500\u2500 CSV \ub0b4\ubcf4\ub0b4\uae30 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\ndef export_csv():\n    if not _last_result: return\n    schedule  = _last_result['schedule']\n    slots     = _last_result['slots']\n    employees = _last_result['employees']\n    sorted_emps = sorted(employees, key=lambda e: (GROUP_ORDER.get(e['group'],1), e['idx']))\n    lines = ['\uc774\ub984,\uc870,' + ','.join(slots)]\n    for e in sorted_emps:\n        row = schedule[e['id']]\n        lines.append(f'{e.get(\"name\",\"\")},{e[\"group\"]},' + ','.join(row))\n    csv_text = '\\n'.join(lines)\n    from js import Blob, URL, document as jsdoc\n    blob = Blob.new(['\\ufeff' + csv_text], Object.fromEntries([['type','text/csv;charset=utf-8;']]))\n    url  = URL.createObjectURL(blob)\n    a = jsdoc.createElement('a')\n    a.href = url\n    a.download = 'blockpyo_schedule.csv'\n    a.click()\n    URL.revokeObjectURL(url)\n\n# \u2500\u2500 \uc800\uc7a5/\ubd88\ub7ec\uc624\uae30 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\ndef do_save():\n    if not _last_result: return\n    import time\n    slot_id = int(time.time() * 1000) % 100000\n    data = {\n        'id': f'save_{slot_id}',\n        'ts': slot_id,\n        'label': f'\uc800\uc7a5 #{slot_id}',\n        'employees': _employees,\n        'settings': read_settings(),\n        'schedule': _last_result['schedule'],\n        'slots':    _last_result['slots'],\n    }\n    def after():\n        set_status('\ud83d\udcbe \uc800\uc7a5 \uc644\ub8cc')\n        refresh_save_badges()\n    idb_put(data, after)\n\ndef refresh_save_badges():\n    def cb(n):\n        badge = document.getElementById('saveBadge')\n        if badge:\n            if n > 0:\n                badge.textContent = str(n)\n                badge.style.display = 'inline'\n            else:\n                badge.style.display = 'none'\n    idb_count(cb)\n\ndef open_load_modal():\n    modal = document.getElementById('saveModal')\n    if not modal: return\n    modal.classList.add('open')\n    save_list = document.getElementById('saveList')\n    if not save_list: return\n    save_list.innerHTML = '<div class=\"save-loading\">\ubd88\ub7ec\uc624\ub294 \uc911...</div>'\n    def render_saves(items):\n        if not items:\n            save_list.innerHTML = '<div class=\"save-empty\">\uc800\uc7a5\ub41c \uc2a4\ucf00\uc904\uc774 \uc5c6\uc2b5\ub2c8\ub2e4</div>'\n            return\n        save_list.innerHTML = ''\n        for item in sorted(items, key=lambda x: -x.get('ts',0)):\n            row = document.createElement('div')\n            row.className = 'save-row'\n            row.innerHTML = f'''\n              <span class=\"save-label\">{item.get(\"label\",\"\uc800\uc7a5\")}</span>\n              <button class=\"btn btn-sm btn-ghost save-load-btn\" data-id=\"{item[\"id\"]}\">\ubd88\ub7ec\uc624\uae30</button>\n              <button class=\"btn btn-sm btn-ghost save-del-btn\"  data-id=\"{item[\"id\"]}\">\uc0ad\uc81c</button>'''\n            def make_load(item_ref):\n                def handler(ev):\n                    global _employees, _last_result\n                    _employees = item_ref.get('employees', [])\n                    render_employee_list()\n                    restore_settings(item_ref.get('settings', {}))\n                    if item_ref.get('schedule'):\n                        fake_result = {\n                            'schedule':  item_ref['schedule'],\n                            'slots':     item_ref['slots'],\n                            'slotsMin':  [],\n                            'employees': item_ref['employees'],\n                            'violations':[],\n                            'stats':     {},\n                        }\n                        _last_result = fake_result\n                        render_table(fake_result)\n                    close_modal()\n                return create_proxy(handler)\n            def make_del(iid):\n                def handler(ev):\n                    def after(): open_load_modal()\n                    idb_delete(iid, after)\n                return create_proxy(handler)\n            row.querySelector('.save-load-btn').addEventListener('click', make_load(item))\n            row.querySelector('.save-del-btn').addEventListener('click', make_del(item['id']))\n            save_list.appendChild(row)\n    idb_get_all(render_saves)\n\ndef close_modal():\n    modal = document.getElementById('saveModal')\n    if modal: modal.classList.remove('open')\n\ndef restore_settings(s):\n    if not s: return\n    for k, v in s.items():\n        el = document.getElementById(k)\n        if el: el.value = str(v)\n\n# \u2500\u2500 \uc0c1\ud0dc \ud45c\uc2dc \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\ndef set_status(msg, cls=''):\n    sm = document.getElementById('statusMsg')\n    if sm:\n        sm.textContent = msg\n        sm.className = 'status-badge ' + cls\n\n# \u2500\u2500 \uc124\uc815 UI \ucd08\uae30\ud654 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\ndef init_settings_ui():\n    time_options = [min_to_time(m) for m in build_slots(parse_time_to_min('06:00'),\n                                                         parse_time_to_min('23:00'), 15)]\n    for sel_id, default in [('dayStart','08:00'),('dayEnd','22:30')]:\n        sel = document.getElementById(sel_id)\n        if not sel: continue\n        sel.innerHTML = ''\n        for t in time_options:\n            opt = document.createElement('option')\n            opt.value = t\n            opt.textContent = t\n            if t == default: opt.selected = True\n            sel.appendChild(opt)\n    qa_start = document.getElementById('qaStart')\n    if qa_start:\n        qa_start.innerHTML = ''\n        for t in DEFAULT_START_OPTIONS:\n            opt = document.createElement('option')\n            opt.value = t\n            opt.textContent = t\n            if t == '11:00': opt.selected = True\n            qa_start.appendChild(opt)\n\n# \u2500\u2500 \uc0d8\ud50c \ub370\uc774\ud130 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nSAMPLE_EMPLOYEES = [\n    {'name':'\uae40\ucca0\uc218','group':'OPEN', 'start':'08:30','hours':8},\n    {'name':'\uc774\uc601\ud76c','group':'OPEN', 'start':'08:30','hours':8},\n    {'name':'\ubc15\ubbfc\uc900','group':'MID',  'start':'11:00','hours':8},\n    {'name':'\ucd5c\uc218\uc5f0','group':'MID',  'start':'11:45','hours':8},\n    {'name':'\uc815\ud0dc\uc591','group':'MID',  'start':'12:00','hours':8},\n    {'name':'\ud55c\uc18c\ud76c','group':'MID',  'start':'13:00','hours':8},\n    {'name':'\uc724\uc9c0\ud6c8','group':'MID',  'start':'13:30','hours':6},\n    {'name':'\uc7a5\ub098\ub77c','group':'CLOSE','start':'13:30','hours':8},\n    {'name':'\uc784\uc7ac\ud604','group':'CLOSE','start':'13:50','hours':8},\n    {'name':'\uc624\uc138\uc9c4','group':'CLOSE','start':'15:30','hours':8},\n]\n\ndef load_sample():\n    global _employees\n    _employees = []\n    for d in SAMPLE_EMPLOYEES:\n        add_employee(d)\n    render_employee_list()\n    set_status('\uc0d8\ud50c \ub370\uc774\ud130 \ub85c\ub4dc\ub428')\n\n# \u2500\u2500 \uc2a4\ucf00\uc904 \uc0dd\uc131 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\ndef do_generate():\n    global _last_result\n    # \uc9c1\uc6d0 \ubaa9\ub85d DOM\uc5d0\uc11c \ub3d9\uae30\ud654\n    for card in document.querySelectorAll('.emp-card'):\n        eid = card.dataset.id\n        emp = next((e for e in _employees if e['id']==eid), None)\n        if emp:\n            start_sel = card.querySelector('.emp-start')\n            hours_sel = card.querySelector('.emp-hours')\n            if start_sel: emp['start'] = start_sel.value\n            if hours_sel: emp['hours'] = int(hours_sel.value)\n            name_span = card.querySelector('.emp-name')\n            if name_span and not name_span.querySelector('input'):\n                emp['name'] = name_span.textContent\n\n    if not _employees:\n        set_status('\uc9c1\uc6d0\uc744 \uba3c\uc800 \ucd94\uac00\ud558\uc138\uc694', 'warn')\n        return\n\n    overlay = document.getElementById('loadingOverlay')\n    if overlay: overlay.classList.add('show')\n\n    from js import setTimeout\n    def run_gen():\n        global _last_result\n        try:\n            settings = read_settings()\n            inp = {**settings, 'employees': _employees}\n            result = generate_schedule(inp)\n            _last_result = result\n            render_table(result)\n            set_status(f'\u2705 \uc0dd\uc131 \uc644\ub8cc (\uc704\ubc18 {len(result[\"violations\"])}\uac74)', 'ok' if not result['violations'] else 'warn')\n        except Exception as e:\n            set_status(f'\uc624\ub958: {e}', 'warn')\n            console.error(str(e))\n            import traceback\n            console.error(traceback.format_exc())\n        finally:\n            if overlay: overlay.classList.remove('show')\n    setTimeout(create_proxy(lambda: run_gen()), 50)\n\n# \u2500\u2500 \uc774\ubca4\ud2b8 \ub4f1\ub85d \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\ndef bind_events():\n    def bind(id_, handler):\n        el = document.getElementById(id_)\n        if el: el.addEventListener('click', create_proxy(handler))\n\n    bind('btnQaAdd', lambda ev: (\n        add_employee({\n            'name':  document.getElementById('qaName').value,\n            'group': document.getElementById('qaGroup').value,\n            'start': document.getElementById('qaStart').value,\n            'hours': int(document.getElementById('qaHours').value),\n        }),\n        render_employee_list(),\n        setattr(document.getElementById('qaName'), 'value', ''),\n    ))\n    bind('btnSample',    lambda ev: load_sample())\n    bind('btnGenerate',  lambda ev: do_generate())\n    bind('btnSave',      lambda ev: do_save())\n    bind('btnLoad',      lambda ev: open_load_modal())\n    bind('btnModalClose',lambda ev: close_modal())\n    bind('btnModalCancel',lambda ev: close_modal())\n    bind('btnExportCsv', lambda ev: export_csv())\n    bind('btnPrint',     lambda ev: (setattr(document.getElementById('tableWrap'), 'style',\n                                             document.getElementById('tableWrap').style), __import__('js').window.print()))\n\n    # \ud0ed \uc804\ud658\n    for tab_btn in document.querySelectorAll('.stab'):\n        def make_tab(btn):\n            def handler(ev):\n                for b in document.querySelectorAll('.stab'): b.classList.remove('active')\n                for p in document.querySelectorAll('.stab-panel'): p.classList.remove('active')\n                btn.classList.add('active')\n                panel = document.getElementById(f'tab{btn.dataset.tab.capitalize()}')\n                if not panel:\n                    tab_id = 'tab' + btn.dataset.tab[0].upper() + btn.dataset.tab[1:]\n                    panel = document.getElementById(tab_id)\n                if panel: panel.classList.add('active')\n            return create_proxy(handler)\n        tab_btn.addEventListener('click', make_tab(tab_btn))\n\n    # \uc140 \ud06c\uae30\n    for size_btn in document.querySelectorAll('.size-btn'):\n        def make_size(btn):\n            def handler(ev):\n                global _current_size\n                for b in document.querySelectorAll('.size-btn'): b.classList.remove('active')\n                btn.classList.add('active')\n                _current_size = btn.dataset.size\n                if _last_result: render_table(_last_result)\n            return create_proxy(handler)\n        size_btn.addEventListener('click', make_size(size_btn))\n\n    # \uc2a4\ud06c\ub864\n    def scroll_left(ev):\n        c = document.querySelector('.table-scroll-container')\n        if c: c.scrollBy(Object.fromEntries([['left',-120],['behavior','smooth']]))\n    def scroll_right(ev):\n        c = document.querySelector('.table-scroll-container')\n        if c: c.scrollBy(Object.fromEntries([['left',120],['behavior','smooth']]))\n    bind('btnScrollLeft',  scroll_left)\n    bind('btnScrollRight', scroll_right)\n\n    # \uc5d4\ud130\ub85c \ube60\ub978 \ucd94\uac00\n    qa_name = document.getElementById('qaName')\n    if qa_name:\n        def on_enter(ev):\n            if ev.key == 'Enter':\n                add_employee({'name': qa_name.value,\n                              'group': document.getElementById('qaGroup').value,\n                              'start': document.getElementById('qaStart').value,\n                              'hours': int(document.getElementById('qaHours').value)})\n                render_employee_list()\n                qa_name.value = ''\n        qa_name.addEventListener('keydown', create_proxy(on_enter))\n\n# \u2500\u2500 \uc9c4\uc785\uc810 \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\ndef main():\n    init_settings_ui()\n    bind_events()\n    open_db()\n    set_status('\uc900\ube44\ub428 \u2014 \uc9c1\uc6d0\uc744 \ucd94\uac00\ud558\uace0 \uc2a4\ucf00\uc904\uc744 \uc0dd\uc131\ud558\uc138\uc694')\n\nmain()\n";


    async function bootPyodide() {
      setProgress(5, 'Pyodide 다운로드 중...', 'LOADING PYODIDE');
      const pyodide = await loadPyodide({
        indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.27.0/full/',
      });
      setProgress(40, '파이썬 모듈 설치 중...', 'WRITING MODULES');

      // ── Write Python modules to virtual FS ──
  pyodide.FS.mkdir("/py");
  pyodide.FS.mkdir("/py/scheduler");
  pyodide.FS.writeFile("/py/constants.py", src_constants);
  pyodide.FS.writeFile("/py/utils.py", src_utils);
  pyodide.FS.writeFile("/py/scheduler/__init__.py", src_scheduler_init);
  pyodide.FS.writeFile("/py/scheduler/core.py", src_scheduler_core);
  pyodide.FS.writeFile("/py/scheduler/events.py", src_scheduler_events);
  pyodide.FS.writeFile("/py/scheduler/assign.py", src_scheduler_assign);
  pyodide.FS.writeFile("/py/scheduler/balance.py", src_scheduler_balance);
  pyodide.FS.writeFile("/py/scheduler/repair.py", src_scheduler_repair);
  pyodide.FS.writeFile("/py/scheduler/force.py", src_scheduler_force);
  pyodide.FS.writeFile("/py/scheduler/validate.py", src_scheduler_validate);
  pyodide.FS.writeFile("/py/scheduler/index.py", src_scheduler_index);
  pyodide.FS.writeFile("/py/app.py", src_app);


      setProgress(65, '모듈 경로 등록 중...', 'CONFIGURING PATH');
      pyodide.runPython(`
import sys
for p in ['/py', '/py/scheduler', '.']:
    if p not in sys.path:
        sys.path.insert(0, p)
`);
      setProgress(80, '앱 초기화 중...', 'RUNNING APP');
      pyodide.runPython(src_app);
      setProgress(100, '준비 완료!', 'READY');

      // Fade out overlay
      setTimeout(() => {
        const overlay = document.getElementById('pyLoadOverlay');
        if (overlay) {
          overlay.classList.add('fade-out');
          setTimeout(() => overlay.remove(), 600);
        }
      }, 300);
    }

    bootPyodide().catch(err => {
      console.error('Pyodide boot error:', err);
      if (hint) hint.textContent = '오류: ' + err.message;
      if (stage) stage.textContent = 'ERROR';
    });
  })();
  </script>
